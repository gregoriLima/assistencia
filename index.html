<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contagem de assistência</title>
  <style>
    body {
      height: 100vh;
      width: 100vw;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: sans-serif;
      text-transform: uppercase;
      background-color: #121212;
    }

    main {
      color: whitesmoke;
      background-color: #4a6da7;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-direction: column;
      padding: 35px;
      min-height: 15vh;
      min-width: 15vw;
      border-radius: 10px;
      border: 4px solid #a8b1c1;
    }

    legend {
      font-size: 18px;
    }

    label {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      font-weight: bold;
    }

    input,
    button,
    label {
      border: none;
      border-radius: 5px;
      outline: none;
      width: 100%;
    }

    label,
    button {
      font-size: 22px;
      text-transform: uppercase;
    }

    input {
      text-align: center;
      font-size: 20px;
      height: 30px;
      padding: 5px 0;
      margin-top: 10px;
      color: #4a6da7;
    }

    button {
      border: none;
      background: linear-gradient(180deg, #3d6fc5 0%, #1c4892 55%, #14356c 100%);
      color: whitesmoke;
      padding: 15px;
      margin-top: 20px;
      cursor: pointer;
      border: 1px solid #9eb8eb;
      box-shadow: 0 6px 0 #0d2248, 0 12px 18px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.4);
      transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #0d2248, 0 6px 10px rgba(0, 0, 0, 0.28), inset 0 2px 4px rgba(0, 0, 0, 0.18);
    }

    img {
      margin-bottom: 20px;
      width: 100px;
      height: 100px;
    }
  </style>
</head>

<body>
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c9/JW_Logo.svg/250px-JW_Logo.svg.png" alt="jw" />

  <main>
    <label>
      Assistência:
      <input id="attendance" type="text" inputmode="numeric" maxlength="3" pattern="\d{1,3}" />
    </label>
    <label>
      Congregação:
      <input id="id" type="text" value="Nordeste" readonly />
    </label>

    <button id="send">Enviar</button>
  </main>

  <script type="application/javascript">
    function bindEvents() {
      const attendanceField = document.querySelector('#attendance');

      attendanceField.addEventListener('input', () => {
        attendanceField.value = sanitizeAttendance(attendanceField.value);
      });

      document.querySelector('#send').onclick = () => {
        const { attendance, id } = getFields();

        if (!attendance || !id) {
          return alert(!attendance ? 'Informe a assistência' : 'Informe a congregação');
        }

        if (!isValidAttendance(attendance)) {
          return alert('Informe uma assistência com até 3 dígitos');
        }

        if (confirm(`confirmar envio da assistência de ${attendance}?`)) {
          sendEmail(attendance, id);
        }
      };
    }

    function sanitizeAttendance(value) {
      return value.replace(/\D/g, '').slice(0, 3);
    }

    function isValidAttendance(value) {
      return /^\d{1,3}$/.test(value);
    }

    function getFields() {
      const attendance = sanitizeAttendance(document.querySelector('#attendance').value);
      const id = document.querySelector('#id').value;
      return { attendance, id };
    }

    async function sendEmail(attendance, id) {
      try {
        const response = await fetch('/api/send-email', {
          headers: {
            Accept: 'application/json',
            'Content-Type': 'application/json'
          },
          method: 'POST',
          body: JSON.stringify({
            id,
            attendance
          })
        });
        const { success, message } = await response.json();
        const defaultMessage = success ? 'E-mail enviado' : 'Não foi possível enviar e-mail';
        alert(message || defaultMessage);
      } catch (error) {
        alert(error);
      }
    }

    bindEvents();
  </script>
</body>

</html>
